<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Laboratory Visitor Log</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Signature Pad Library -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-8">
        <!-- Header -->
        <div class="text-center mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-2xl font-bold text-gray-800 tracking-wide">QC LABORATORY VISITOR LOG</h1>
            <p class="text-sm text-gray-500 mt-1">Please fill out the form before entering and after leaving the laboratory.</p>
        </div>

        <!-- Form -->
        <form id="visitorForm" class="space-y-6">
            
            <!-- Name & Position -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name *</label>
                    <input type="text" id="fullName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Position / Job Title *</label>
                    <input type="text" id="position" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Company & Escort -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Company / Department *</label>
                    <input type="text" id="company" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Escorted By (QC Staff Name) *</label>
                    <input type="text" id="escortBy" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- Purpose of Visit -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Purpose of Visit *</label>
                <textarea id="purpose" rows="3" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Equipment calibration, Audit, Maintenance..."></textarea>
            </div>

            <!-- Time In & Time Out -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Time In *</label>
                    <div class="flex gap-2">
                        <input type="datetime-local" id="timeIn" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="button" onclick="setCurrentTime('timeIn')" class="px-3 py-2 bg-gray-200 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-300 transition">Now</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Time Out (Optional upon entry)</label>
                    <div class="flex gap-2">
                        <input type="datetime-local" id="timeOut" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="button" onclick="setCurrentTime('timeOut')" class="px-3 py-2 bg-gray-200 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-300 transition">Now</button>
                    </div>
                </div>
            </div>

            <!-- Signature -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Visitor's Signature *</label>
                <div class="border border-gray-300 rounded-lg bg-gray-50 overflow-hidden">
                    <canvas id="signature-pad" class="w-full h-40 bg-gray-50 touch-none"></canvas>
                </div>
                <div class="flex justify-end mt-1">
                    <button type="button" id="clearSig" class="text-xs text-red-500 hover:text-red-700 font-medium">Clear Signature</button>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">
                    SUBMIT LOG
                </button>
            </div>
