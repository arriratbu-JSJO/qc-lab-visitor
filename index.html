<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Laboratory Visitor Log</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Signature Pad Library -->
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md p-6">
        <!-- Header -->
        <div class="text-center mb-8 border-b border-gray-200 pb-4">
            <h1 class="text-2xl font-bold text-gray-800">QC LAB VISITOR LOG</h1>
            <p class="text-sm text-gray-500 mt-1">ระบบบันทึกรายชื่อผู้เข้าห้องปฏิบัติการ QC</p>
        </div>

        <!-- Form -->
        <form id="visitorForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name *</label>
                <input type="text" id="fullName" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Position / Job Title *</label>
                <input type="text" id="position" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Company / Department *</label>
                <input type="text" id="company" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Escorted By (QC Staff Name) *</label>
                <input type="text" id="escortBy" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Purpose of Visit *</label>
                <textarea id="purpose" required rows="3" placeholder="e.g., Equipment calibration, Audit, Maintenance..." class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Time In *</label>
                    <div class="flex gap-2">
                        <input type="time" id="timeIn" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="button" onclick="document.getElementById('timeIn').value = new Date().toTimeString().slice(0,5)" class="bg-gray-200 hover:bg-gray-300 text-sm font-medium px-3 rounded-lg">Now</button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Time Out (Optional upon entry)</label>
                    <div class="flex gap-2">
                        <input type="time" id="timeOut" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="button" onclick="document.getElementById('timeOut').value = new Date().toTimeString().slice(0,5)" class="bg-gray-200 hover:bg-gray-300 text-sm font-medium px-3 rounded-lg">Now</button>
                    </div>
                </div>
            </div>

            <!-- Signature Pad Canvas (แก้ไขเพื่อรองรับการทัชรูดลากบนมือถือ) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Visitor's Signature *</label>
                <div class="border border-gray-300 rounded-lg bg-gray-50 overflow-hidden">
                    <canvas id="signature-pad" class="w-full h-44 block" style="background-color: #f9fafb; touch-action: none;"></canvas>
                </div>
                <div class="flex justify-end mt-1">
                    <button type="button" id="clearBtn" class="text-xs font-medium text-red-500 hover:text-red-700 p-1">Clear Signature</button>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">
                    SUBMIT LOG
                </button>
            </div>
        </form>
    </div>

    <script>
        // Initialize Signature Pad
        const canvas = document.getElementById('signature-pad');
        const signaturePad = new SignaturePad(canvas, {
            backgroundColor: 'rgba(255, 255, 255, 0)',
            penColor: 'rgb(0, 0, 0)'
        });

        // Adjust canvas size on load
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }
        window.addEventListener("resize", resizeCanvas);
        setTimeout(resizeCanvas, 1000);

        // Clear button function
        document.getElementById('clearBtn').addEventListener('click', () => {
            signaturePad.clear();
        });

        // Handle Form Submission
        document.getElementById('visitorForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (signaturePad.isEmpty()) {
                alert("กรุณาเซ็นชื่อก่อนส่งข้อมูลค่ะ!");
                return;
            }

            const signatureData = signaturePad.toDataURL();

            // รวบรวมข้อมูลครบทุกช่องตรงตามฟอร์มของคุณ
            const logData = {
                fullName: document.getElementById('fullName').value,
                position: document.getElementById('position').value,
                company: document.getElementById('company').value,
                escortBy: document.getElementById('escortBy').value,
                purpose: document.getElementById('purpose').value,
                timeIn: document.getElementById('timeIn').value,
                timeOut: document.getElementById('timeOut').value,
                signature: signatureData
            };

            // ท่อส่งข้อมูล Google Apps Script ของคุณ
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwilk3aB5o69UZalJZ6qCSd7QaFe0nUecBy3V-LdMV0NdlxxVgxJUkYDyl1UVK6Sfrc/exec';

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(logData)
            })
            .then(() => {
                alert("บันทึกข้อมูลและส่งรายชื่อเข้าห้องแล็บสำเร็จเรียบร้อยแล้วค่ะ!");
                this.reset();
                signaturePad.clear();
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง");
            });
        });
    </script>
</body>
</html>
